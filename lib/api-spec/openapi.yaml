openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: fridge
    description: Fridge scanning operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze-fridge:
    post:
      operationId: analyzeFridge
      tags: [fridge]
      summary: Analyze fridge image
      description: Analyzes a fridge/pantry image using AI vision and returns detected ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeFridgeRequest"
      responses:
        "200":
          description: Ingredients detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeFridgeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeFridgeRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64 encoded image data (without data URL prefix)
        mimeType:
          type: string
          description: MIME type of the image (e.g. image/jpeg)
      required:
        - imageBase64
        - mimeType
    AnalyzeFridgeResponse:
      type: object
      properties:
        ingredients:
          type: array
          items:
            type: string
          description: List of detected ingredient names
      required:
        - ingredients
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
